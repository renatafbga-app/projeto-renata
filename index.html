<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Projeto Renata · 90 Dias</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="Programa personalizado de 90 dias — treino, progresso e saúde.">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">

<!-- iOS / PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Projeto Renata">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<link rel="manifest" href="./manifest.json">

<link rel="stylesheet" href="./css/tokens.css">
<link rel="stylesheet" href="./css/base.css">
<link rel="stylesheet" href="./css/components.css">
<link rel="stylesheet" href="./css/views.css">
<link rel="stylesheet" href="./css/book.css">
</head>
<body>

<!-- Splash de abertura -->
<div id="splash" class="splash">
  <div class="splash-mark">
    <svg viewBox="0 0 64 64" width="64" height="64" aria-hidden="true">
      <circle cx="32" cy="32" r="29" fill="none" stroke="var(--accent)" stroke-width="4"
              stroke-linecap="round" stroke-dasharray="140 182" transform="rotate(-90 32 32)"/>
      <path d="M22 34 L29 41 L43 25" fill="none" stroke="var(--accent)"
            stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="splash-title">PROJETO RENATA</div>
  <div class="splash-sub">90 dias para os 65 kg</div>
</div>

<!-- Barra de navegação (título grande estilo iOS) -->
<header id="navbar" class="navbar">
  <div class="navbar-bar">
    <button id="navBack" class="navbar-back" type="button" hidden>
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path d="M15 5 L8 12 L15 19" fill="none" stroke="currentColor"
              stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="navBackLabel">Voltar</span>
    </button>
    <div id="navCompactTitle" class="navbar-compact-title"></div>
    <div id="navActions" class="navbar-actions"></div>
  </div>
  <div id="dateBar" class="date-bar" hidden>
    <button id="datePrev" class="date-nav" type="button" aria-label="Dia anterior">
      <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M15 5 L8 12 L15 19" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="dateLabel" class="date-label" type="button" aria-label="Escolher data"></button>
    <button id="dateNext" class="date-nav" type="button" aria-label="Próximo dia">
      <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M9 5 L16 12 L9 19" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <input id="datePicker" type="date" class="date-picker" aria-hidden="true" tabindex="-1">
  </div>
  <div id="navLarge" class="navbar-large">
    <h1 id="navTitle">Início</h1>
    <p id="navSubtitle" class="navbar-subtitle"></p>
  </div>
</header>

<!-- Container das telas -->
<noscript>
  <div style="padding:40px 24px;text-align:center;color:#fff;font-family:system-ui">
    <h1 style="font-size:22px">Projeto Renata</h1>
    <p style="opacity:.7;margin-top:12px">Este aplicativo precisa de JavaScript ativado.</p>
  </div>
</noscript>
<main id="app" class="app" role="main" aria-live="polite"></main>

<!-- Tab bar inferior -->
<nav id="tabbar" class="tabbar" role="navigation" aria-label="Navegação principal"></nav>

<!-- Camadas de sobreposição -->
<div id="sheetLayer" class="sheet-layer" hidden></div>
<div id="toastLayer" class="toast-layer" aria-live="assertive"></div>

<!-- Vigia de inicialização (script clássico, roda antes dos módulos).
     Se app.js falhar, o splash — que é opaco e cobre a tela — ficaria para
     sempre por cima, com o aplicativo aparentemente travado e sem nenhuma
     pista do motivo. Este vigia garante uma mensagem acionável no aparelho,
     onde não existe console de desenvolvedor. -->
<script>
(function () {
  var erros = [];
  window.addEventListener('error', function (e) {
    erros.push((e.message || 'erro') + (e.filename ? ' — ' + e.filename.split('/').pop() + ':' + e.lineno : ''));
  });
  window.addEventListener('unhandledrejection', function (e) {
    erros.push('Promise: ' + ((e.reason && e.reason.message) || e.reason));
  });
  setTimeout(function () {
    if (window.__PR_BOOTED) return;
    var s = document.getElementById('splash');
    if (s) s.classList.add('hide');
    var d = document.createElement('div');
    d.setAttribute('role', 'alert');
    d.style.cssText = 'position:fixed;inset:0;z-index:300;background:#000;color:#fff;' +
      'padding:32px 24px;font:15px/1.5 -apple-system,system-ui,sans-serif;overflow:auto';
    d.innerHTML = '<h1 style="font-size:20px;margin:0 0 12px">O aplicativo não iniciou</h1>' +
      '<p style="opacity:.7;margin:0 0 16px">Verifique a conexão e recarregue. Se persistir, ' +
      'envie a mensagem abaixo.</p>' +
      '<pre style="white-space:pre-wrap;background:#1C1C1E;padding:12px;border-radius:10px;' +
      'font-size:12px;opacity:.85">' + (erros.join('\n') || 'sem erro capturado') + '</pre>' +
      '<button style="margin-top:16px;padding:13px 20px;border-radius:12px;border:0;' +
      'background:#E76F51;color:#fff;font-weight:600;font-size:16px" ' +
      'onclick="location.reload()">Recarregar</button>';
    document.body.appendChild(d);
  }, 8000);
})();
</script>

<script type="module" src="./js/app.js"></script>
</body>
</html>
